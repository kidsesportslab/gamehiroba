<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゲーム広場</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Orbitron:wght@700;900&family=M+PLUS+1:wght@400;500;700&display=swap');
:root {
  --accent: #00e5a0; --accent-dim: #00b87e; --accent-dark: #007a54;
  --accent-glow: rgba(0,229,160,0.18);
  --bg: #0d1117; --bg-2: #161b22; --bg-3: #1c2430;
  --text: #e6edf3; --text-2: #8b949e; --text-3: #484f58;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'M PLUS 1', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); }
.header { background: #161b22; padding: 16px 20px; border-bottom: 1px solid rgba(0,229,160,0.35); display: flex; align-items: center; }
.logo { font-family: 'Orbitron', monospace; font-size: 20px; color: #00e5a0; text-shadow: 0 0 14px rgba(0,229,160,0.18); }
.logo em { color: #ffb300; font-style: normal; }
.main { max-width: 900px; margin: 40px auto; padding: 20px; text-align: center; }
.coming-soon { font-size: 24px; font-weight: 700; color: #e6edf3; margin-bottom: 16px; }
.desc { color: #8b949e; font-size: 15px; line-height: 1.8; }
.badge { display: inline-flex; padding: 4px 12px; border-radius: 6px; font-size: 13px; font-weight: 700; margin: 4px; background: rgba(0,229,160,0.15); color: #00e5a0; border: 1px solid rgba(0,229,160,0.3); }
</style>
</head>
<body>
<div class="header"><div class="logo">ゲーム<em>広場</em></div></div>
<div class="main">
<div class="coming-soon">🎮 フルバージョン準備中</div>
<p class="desc">全プラットフォーム対応のゲームコミュニティサイト<br>ゲーム評価・マルチ募集・大会開催がすべて揃う場所</p>
<br><div>
<span class="badge">ゲーム評価</span>
<span class="badge">マルチ募集</span>
<span class="badge">大会開催</span>
<span class="badge">フレンド機能</span>
</div>
</div>
</body>
</html>
